{% extends 'base.html' %}

{% block content %}
<h2>{{ title }}</h2>

<table border="1">
<tr>
    <th>Student</th>
    <th>Supervisor</th>
    <th>Criteria</th>
    <th>Score</th>
</tr>

{% for e in evaluations %}
<tr>
    <td>{{ e.student }}</td>
    <td>{{ e.supervisor }}</td>
    <td>{{ e.criteria }}</td>
    <td>{{ e.performance_score }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
